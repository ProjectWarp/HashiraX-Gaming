<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your YouTube Channel - Videos & Support</title>
    <script src="https://unpkg.com/@paypal/react-paypal-js@latest/dist/iife/paypal-js.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            color: white;
            padding: 40px 0;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .social-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 30px 0;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .youtube-btn {
            background: #FF0000;
            color: white;
        }

        .youtube-btn:hover {
            background: #CC0000;
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(255,0,0,0.4);
        }

        .tiktok-btn {
            background: linear-gradient(45deg, #000000, #ff0050);
            color: white;
        }

        .tiktok-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(255,0,80,0.4);
        }

        .facebook-btn {
            background: #1877F2;
            color: white;
        }

        .facebook-btn:hover {
            background: #166FE5;
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(24,119,242,0.4);
        }

        .paypal-btn {
            background: linear-gradient(45deg, #003087, #0070ba);
            color: white;
            padding: 18px 35px;
            font-size: 1.2em;
        }

        .paypal-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0,48,135,0.4);
        }

        .videos-section {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        .section-title {
            font-size: 2.5em;
            text-align: center;
            margin-bottom: 40px;
            color: #333;
        }

        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .video-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .video-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .video-thumbnail {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .video-info {
            padding: 20px;
        }

        .video-title {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .video-desc {
            color: #666;
            font-size: 0.95em;
            margin-bottom: 15px;
        }

        .support-section {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            color: white;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .support-title {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }
            
            .social-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 300px;
                justify-content: center;
            }
            
            .videos-grid {
                grid-template-columns: 1fr;
            }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>🎥 HashiraX Gaming</h1>
            <p class="subtitle">Watch my latest videos and support my content creation!</p>
            
            <!-- Social Follow Buttons -->
            <div class="social-buttons">
                <a href="https://youtube.com/@HashiraXGaming?sub_confirmation=1" 
                   class="btn youtube-btn pulse" 
                   target="_blank">
                    📺 Subscribe to YouTube
                </a>
                <a href="https://tiktok.com/@hashiraxgaming" 
                   class="btn tiktok-btn" 
                   target="_blank">
                    🎵 Follow on TikTok
                </a>
                <a href="https://facebook.com/hashiraxgaming" 
                   class="btn facebook-btn" 
                   target="_blank">
                    💙 Follow on Facebook
                </a>
            </div>
        </header>

        <!-- Videos Section -->
        <section class="videos-section">
            <h2 class="section-title">Featured Videos</h2>
            <div class="videos-grid" id="videosGrid">
                <!-- Manual videos will be displayed here -->
            </div>
        </section>

        <!-- Support Section -->
        <section class="support-section">
            <h2 class="support-title">💖 Support My Content</h2>
            <p style="font-size: 1.2em; margin-bottom: 30px;">
                Love my videos? Buy me a coffee or send a tip! ☕
            </p>
            
            <!-- PayPal Button -->
            <div id="paypal-button-container" class="paypal-container"></div>
        </section>
    </div>

    <script>
        // 🔥 MANUAL VIDEO INPUT - ADD YOUR VIDEOS HERE
        const MANUAL_VIDEOS = [
            {
                id: 'zuTh6qZ2574',  // Replace with your video ID
                title: '🚀 Wuthering Dragon Nest Newbie Guide Part 1 !',
                description: 'Setting Up your Character and Guide Must watch this!',
                thumbnail: 'https://img.youtube.com/vi/dQw4w9WgXcQ/mqdefault.jpg'
            },
            {
                id: 'T6ahofjH4d0',  // Replace with your video ID
                title: '💥 Wuthering Dragon Nest Newbie Guide Part 2 !',
                description: 'Step-by-step guide for farming DNP & Wune Points!',
                thumbnail: 'https://img.youtube.com/vi/kJQP7kiw5Fk/mqdefault.jpg'
            },
            {
                id: 'OaNPAEHxTp8',  // Replace with your video ID
                title: '🎮 Wuthering Dragon Nest Newbie Guide Part 3 !',
                description: 'Guide to craft your Early Weapon for EOD!',
                thumbnail: 'https://img.youtube.com/vi/9bZkp7q19f0/mqdefault.jpg'
            },
            {
                id: '1ok381bWmk8',  // Replace with your video ID
                title: '🔥 Wuthering Dragon Nest Newbie Guide Part 4 !',
                description: "Guide for Lunar Jades and Heraldry Materials? Find out here!",
                thumbnail: 'https://img.youtube.com/vi/PUmm8aJS7uM/mqdefault.jpg'
            },
            {
                id: 'netZV1XoLMM',  // Replace with your video ID
                title: '🎵 Wuthering Dragon Nest Newbie Guide Part 5 !',
                description: 'Leveling your Adventure Rank!',
                thumbnail: 'https://img.youtube.com/vi/22sN6Yo-88w/mqdefault.jpg'
            },
            {
                id: 'Q1HzS3QFhps',  // Replace with your video ID
                title: '💡 Chill Moment While Farming :-)',
                description: 'Chi Chi Chimon Chi!',
                thumbnail: 'https://img.youtube.com/vi/iYqO7G1K9pQ/mqdefault.jpg'
            }
        ];

        // Function to display manual videos
        function displayManualVideos() {
            const grid = document.getElementById('videosGrid');
            grid.innerHTML = '';

            MANUAL_VIDEOS.forEach(video => {
                const videoCard = createVideoCard(video);
                grid.appendChild(videoCard);
            });
        }

        function createVideoCard(video) {
            const card = document.createElement('div');
            card.className = 'video-card';
            
            card.innerHTML = `
                <img src="${video.thumbnail}" alt="${video.title}" class="video-thumbnail">
                <div class="video-info">
                    <h3 class="video-title">${video.title}</h3>
                    <p class="video-desc">${video.description}</p>
                    <a href="https://youtube.com/watch?v=${video.id}" 
                       class="btn youtube-btn" 
                       target="_blank" 
                       style="width: 100%; justify-content: center;">
                        Watch Now ▶
                    </a>
                </div>
            `;
            
            return card;
        }

        // Initialize PayPal
        function initPayPalButton() {
            paypal.Buttons({
                createOrder: function(data, actions) {
                    return actions.order.create({
                        purchase_units: [{
                            amount: {
                                value: '5.00' // Default tip amount - change as needed
                            }
                        }]
                    });
                },
                onApprove: function(data, actions) {
                    return actions.order.capture().then(function(details) {
                        alert('Thank you ' + details.payer.name.given_name + '! Your tip has been received! 🙏');
                    });
                },
                onError: function(err) {
                    console.error('PayPal error:', err);
                    alert('Payment failed. Please try again.');
                }
            }).render('#paypal-button-container');
        }

        // Initialize everything when page loads
        document.addEventListener('DOMContentLoaded', function() {
            displayManualVideos();
            
            // Initialize PayPal after a short delay
            setTimeout(initPayPalButton, 1000);
        });
    </script>
</body>
</html>
